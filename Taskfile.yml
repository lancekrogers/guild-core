# https://taskfile.dev

version: "3"

vars:
  BIN_DIR: ./bin
  CMD_DIR: ./cmd/guild
  MAIN_BIN: guild
  GO_FLAGS: -v
  LDFLAGS: -w -s

tasks:
  default:
    desc: Default task - builds the project
    cmds:
      - task: build

  build:
    desc: Build the Guild binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - rm -f ./guild # Clean any binary in root directory
      - go build {{.GO_FLAGS}} -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.MAIN_BIN}} {{.CMD_DIR}}
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}}"

  run:
    desc: Build and run the Guild CLI with arguments
    deps: [build]
    cmds:
      - |
        if [ -n "{{.CLI_ARGS}}" ]; then
          {{.BIN_DIR}}/{{.MAIN_BIN}} {{.CLI_ARGS}}
        else
          {{.BIN_DIR}}/{{.MAIN_BIN}}
        fi
    interactive: true

  test:
    desc: Run all tests
    cmds:
      - go test -race -count=1 ./...

  test:unit:
    desc: Run unit tests only
    cmds:
      - go test -short -race -count=1 ./...

  test:integration:
    desc: Run integration tests
    cmds:
      - |
        echo "Running integration tests..."
        go test -v ./integration/...

  test:coverage:
    desc: Run tests with coverage analysis
    cmds:
      - mkdir -p ./coverage
      - go test ./... -coverprofile=./coverage/coverage.out
      - go tool cover -html=./coverage/coverage.out -o ./coverage/coverage.html
      - |
        echo "Coverage report generated at ./coverage/coverage.html"
        COVERAGE=$(go tool cover -func=./coverage/coverage.out | grep total | awk '{print $3}')
        echo "Total test coverage: $COVERAGE"

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - go fmt ./...
      - |
        # Check for any unformatted files
        UNFORMATTED=$(gofmt -l .)
        if [ -n "$UNFORMATTED" ]; then
          echo "ERROR: The following files are not properly formatted:"
          echo "$UNFORMATTED"
          exit 1
        fi
      - |
        # Run golangci-lint if available
        if command -v golangci-lint >/dev/null 2>&1; then
          echo "Running golangci-lint..."
          golangci-lint run ./...
        else
          echo "WARNING: golangci-lint not installed. Install with: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest"
        fi

  proto:
    desc: Generate Go code from Protocol Buffer definitions
    cmds:
      - |
        if [ ! -f scripts/generate-proto.sh ]; then
          echo "Error: Proto generation script not found"
          echo "Expected at: scripts/generate-proto.sh"
          exit 1
        fi
      - echo "Generating Go code from Protocol Buffer definitions..."
      - ./scripts/generate-proto.sh
      - echo "✅ Proto generation complete"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -rf ./coverage
      - rm -f ./guild # Remove any binary in root directory
      - go clean -testcache
      - go clean -cache

  verify:
    desc: Verify build and basic functionality
    deps: [build]
    cmds:
      - |
        echo "Verifying Guild binary..."
        if [ ! -f "{{.BIN_DIR}}/{{.MAIN_BIN}}" ]; then
          echo "ERROR: Binary not found at {{.BIN_DIR}}/{{.MAIN_BIN}}"
          exit 1
        fi
        echo "✅ Binary exists"

        # Test that the binary runs without crashing
        if {{.BIN_DIR}}/{{.MAIN_BIN}} --help > /dev/null 2>&1; then
          echo "✅ Binary runs and shows help"
        else
          echo "ERROR: Binary failed to run or show help"
          exit 1
        fi

        echo "✅ Build verification complete"

  deps:install:
    desc: Install required dependencies
    cmds:
      - |
        echo "Installing Go dependencies..."
        go mod download
        go mod tidy

  # Simple task runner shortcuts
  chat:
    desc: Run the Guild chat interface
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} chat {{.CLI_ARGS}}"
    interactive: true

  init:
    desc: Initialize a new Guild project
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} init {{.CLI_ARGS}}"
    interactive: true

  # Development helpers
  fmt:
    desc: Format all Go code
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy and verify module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  # CI/CD tasks
  ci:
    desc: Run all CI checks
    cmds:
      - task: lint
      - task: test
      - task: build
      - task: verify

  # Advanced analysis tasks (moved to separate file if needed)
  test:report:
    desc: Generate comprehensive test report
    cmds:
      - |
        echo "Generating test report..."
        task test:coverage
        echo "Report available at ./coverage/coverage.html"

  # Database management tasks
  db:generate:
    desc: Generate Go code from SQL queries using sqlc
    cmds:
      - |
        echo "Generating Go code from SQL queries..."
        if ! command -v sqlc >/dev/null 2>&1; then
          echo "Installing sqlc..."
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
        fi
        sqlc generate
        echo "✅ Database code generation complete"
    sources:
      - "db/queries/*.sql"
      - "db/migrations/*.sql"
      - "sqlc.yaml"
    generates:
      - "pkg/storage/db/*.go"

  db:new-migration:
    desc: Create a new database migration
    cmds:
      - |
        if [ -z "{{.name}}" ]; then
          echo "ERROR: Migration name required"
          echo "Usage: task db:new-migration name=<migration_name>"
          exit 1
        fi
        
        # Find the highest migration number
        LAST_NUM=$(ls -1 db/migrations/*.up.sql 2>/dev/null | sed 's/.*\/\([0-9]*\).*/\1/' | sort -n | tail -1)
        if [ -z "$LAST_NUM" ]; then
          NEXT_NUM="000001"
        else
          # Remove leading zeros, increment, and pad to 6 digits
          NEXT_NUM=$(printf "%06d" $((10#$LAST_NUM + 1)))
        fi
        
        # Create migration files
        UP_FILE="db/migrations/${NEXT_NUM}_{{.name}}.up.sql"
        DOWN_FILE="db/migrations/${NEXT_NUM}_{{.name}}.down.sql"
        
        touch "$UP_FILE"
        touch "$DOWN_FILE"
        
        echo "-- Migration: {{.name}}" > "$UP_FILE"
        echo "-- Created: $(date)" >> "$UP_FILE"
        echo "" >> "$UP_FILE"
        
        echo "-- Rollback: {{.name}}" > "$DOWN_FILE"
        echo "-- Created: $(date)" >> "$DOWN_FILE"
        echo "" >> "$DOWN_FILE"
        
        echo "✅ Created migration files:"
        echo "  - $UP_FILE"
        echo "  - $DOWN_FILE"
        echo ""
        echo "Next steps:"
        echo "  1. Edit the migration files"
        echo "  2. Run 'task db:migrate' to apply"
        echo "  3. Update queries in db/queries/ if needed"
        echo "  4. Run 'task db:generate' to regenerate Go code"

  db:migrate:
    desc: Run pending database migrations
    cmds:
      - |
        echo "Running database migrations..."
        if ! command -v migrate >/dev/null 2>&1; then
          echo "Installing golang-migrate..."
          go install -tags 'sqlite3' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
        fi
        
        # Default to .guild/memory.db if no path specified
        DB_PATH="${DB_PATH:-.guild/memory.db}"
        
        if [ ! -f "$DB_PATH" ]; then
          echo "Creating database directory..."
          mkdir -p $(dirname "$DB_PATH")
        fi
        
        migrate -path db/migrations -database "sqlite3://$DB_PATH?_foreign_keys=on" up
        echo "✅ Migrations complete"

  db:migrate-down:
    desc: Rollback the last database migration
    cmds:
      - |
        echo "Rolling back last migration..."
        if ! command -v migrate >/dev/null 2>&1; then
          echo "Installing golang-migrate..."
          go install -tags 'sqlite3' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
        fi
        
        # Default to .guild/memory.db if no path specified
        DB_PATH="${DB_PATH:-.guild/memory.db}"
        
        if [ ! -f "$DB_PATH" ]; then
          echo "ERROR: Database not found at $DB_PATH"
          exit 1
        fi
        
        migrate -path db/migrations -database "sqlite3://$DB_PATH?_foreign_keys=on" down 1
        echo "✅ Rollback complete"

  db:status:
    desc: Show database migration status
    cmds:
      - |
        echo "Checking migration status..."
        if ! command -v migrate >/dev/null 2>&1; then
          echo "Installing golang-migrate..."
          go install -tags 'sqlite3' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
        fi
        
        # Default to .guild/memory.db if no path specified
        DB_PATH="${DB_PATH:-.guild/memory.db}"
        
        if [ ! -f "$DB_PATH" ]; then
          echo "Database not found at $DB_PATH"
          echo "Run 'task db:migrate' to create and initialize the database"
        else
          migrate -path db/migrations -database "sqlite3://$DB_PATH?_foreign_keys=on" version
        fi

  db:reset:
    desc: Drop all tables and re-run all migrations (DESTRUCTIVE)
    cmds:
      - |
        echo "⚠️  WARNING: This will DELETE ALL DATA in the database!"
        echo "Press Ctrl+C to cancel, or Enter to continue..."
        read -r
        
        # Default to .guild/memory.db if no path specified
        DB_PATH="${DB_PATH:-.guild/memory.db}"
        
        if [ -f "$DB_PATH" ]; then
          echo "Removing existing database..."
          rm "$DB_PATH"
        fi
        
        echo "Running fresh migrations..."
        task db:migrate
        echo "✅ Database reset complete"
    interactive: true

