# https://taskfile.dev

version: "3"

vars:
  BIN_DIR: ./bin
  CMD_DIR: ./cmd/guild
  MAIN_BIN: guild
  GO_FLAGS: -v
  LDFLAGS: -w -s

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the Guild binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - rm -f ./guild  # Clean any binary in root directory
      - go build {{.GO_FLAGS}} -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.MAIN_BIN}} {{.CMD_DIR}}
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}}"

  run:
    desc: Build and run the Guild CLI with arguments
    deps: [build]
    cmds:
      - |
        if [ -n "{{.CLI_ARGS}}" ]; then
          {{.BIN_DIR}}/{{.MAIN_BIN}} {{.CLI_ARGS}}
        else
          {{.BIN_DIR}}/{{.MAIN_BIN}}
        fi
    interactive: true

  test:
    desc: Run all tests
    cmds:
      - go test -race -count=1 ./...

  test:unit:
    desc: Run unit tests only
    cmds:
      - go test -short -race -count=1 ./...

  test:packages:
    desc: Run tests for specific packages
    cmds:
      - go test {{.GO_FLAGS}} {{.PACKAGE}}
      
  test:coverage:
    desc: Run tests with coverage analysis
    cmds:
      - mkdir -p ./coverage
      - go test ./... -coverprofile=./coverage/coverage.out
      - go tool cover -html=./coverage/coverage.out -o ./coverage/coverage.html
      - |
        echo "Coverage report generated at ./coverage/coverage.html"
        COVERAGE=$(go tool cover -func=./coverage/coverage.out | grep total | awk '{print $3}')
        echo "Total test coverage: $COVERAGE"

  test:coverage:working:
    desc: Run tests with coverage analysis on packages that build successfully
    cmds:
      - mkdir -p ./coverage
      - |
        echo "Running coverage analysis on working packages only..."
        
        # Initialize the coverage file with mode: set
        echo "mode: set" > ./coverage/working.out
        
        # Manually specify the packages we know are working
        WORKING_PACKAGES=(
          "github.com/blockhead-consulting/guild/pkg/providers"
          "github.com/blockhead-consulting/guild/pkg/providers/openai"
          "github.com/blockhead-consulting/guild/tools"
        )
        
        for pkg in "${WORKING_PACKAGES[@]}"; do
          echo "Testing $pkg"
          # Run test with coverage
          if go test -coverprofile=./coverage/temp.out "$pkg"; then
            echo "✅ $pkg"
            # Append to coverage file, skipping the mode line
            tail -n +2 ./coverage/temp.out >> ./coverage/working.out
          else
            echo "❌ $pkg failed"
          fi
        done
        
        # Generate coverage report
        go tool cover -html=./coverage/working.out -o ./coverage/working.html
        COVERAGE=$(go tool cover -func=./coverage/working.out | grep total | awk '{print $3}')
        echo "Coverage report for working packages generated at ./coverage/working.html"
        echo "Total test coverage for working packages: $COVERAGE"
        rm -f ./coverage/temp.out
      
  test:coverage:detailed:
    desc: Run tests with detailed coverage analysis by package
    cmds:
      - mkdir -p ./coverage
      - |
        echo "Running tests with coverage by package..."
        echo "Package Coverage" > ./coverage/package_coverage.txt
        echo "---------------" >> ./coverage/package_coverage.txt
        for pkg in $(go list ./...); do
          echo "Testing $pkg"
          go test -coverprofile=./coverage/cover.out $pkg
          if [ -f ./coverage/cover.out ]; then
            coverage=$(go tool cover -func=./coverage/cover.out | grep total | awk '{print $3}')
            echo "$pkg $coverage" >> ./coverage/package_coverage.txt
          else
            echo "$pkg 0.0%" >> ./coverage/package_coverage.txt
          fi
        done
        echo "Detailed coverage by package saved to ./coverage/package_coverage.txt"
        cat ./coverage/package_coverage.txt
        
  test:verify:
    desc: Verify test coverage for specific packages or files
    cmds:
      - |
        if [ -z "{{.PACKAGE}}" ]; then
          echo "Error: PACKAGE parameter is required"
          echo "Usage: task test:verify PACKAGE=./pkg/your/package"
          exit 1
        fi
        
        echo "Verifying test coverage for {{.PACKAGE}}..."
        
        # Check for exported functions without tests
        mkdir -p ./coverage
        PACKAGE_PATH={{.PACKAGE}}
        
        # Get all exported functions from the package
        echo "Exported functions in {{.PACKAGE}}:"
        EXPORTED_FUNCS=$(grep -r "^func [A-Z]" "$PACKAGE_PATH" --include="*.go" | grep -v "_test.go" | sed -E 's/.*func ([A-Z][a-zA-Z0-9]*).*/\1/' | sort | uniq)
        echo "$EXPORTED_FUNCS"
        
        # Get all test functions for the package
        echo -e "\nTest functions in {{.PACKAGE}}:"
        TEST_FUNCS=$(grep -r "^func Test" "$PACKAGE_PATH" --include="*_test.go" | sed -E 's/.*func (Test[a-zA-Z0-9_]*).*/\1/' | sort | uniq)
        echo "$TEST_FUNCS"
        
        # Check for exported functions without tests
        echo -e "\nPotentially untested functions:"
        for func in $EXPORTED_FUNCS; do
          if ! echo "$TEST_FUNCS" | grep -q "Test$func"; then
            echo "- $func"
          fi
        done
        
        # Run test with coverage
        echo -e "\nRunning tests with coverage for {{.PACKAGE}}..."
        go test {{.PACKAGE}} -coverprofile=./coverage/verify.out
        go tool cover -func=./coverage/verify.out
        
        # Generate coverage report
        go tool cover -html=./coverage/verify.out -o ./coverage/verify.html
        echo "Coverage report generated at ./coverage/verify.html"
  
  test:verify:all:
    desc: Verify test coverage for all working packages
    cmds:
      - mkdir -p ./coverage
      - |
        # Run for each working package
        WORKING_PACKAGES=(
          "./pkg/providers"
          "./pkg/providers/openai"
          "./tools"
        )
        
        for pkg in "${WORKING_PACKAGES[@]}"; do
          echo "=== Verifying $pkg ==="
          task test:verify PACKAGE="$pkg"
          echo ""
        done
  
  test:analyze:
    desc: Analyze test patterns and identify potential test quality issues
    cmds:
      - |
        echo "Analyzing test patterns for quality issues..."

        # Check for missing error cases in tests
        echo "Checking for missing error tests..."
        ERROR_HANDLERS=$(grep -r "if err != nil" --include="*.go" . | grep -v "_test.go" | wc -l)
        ERROR_TESTS=$(grep -r "if err != nil" --include="*_test.go" . | wc -l)
        ERROR_FORCED=$(grep -r "return .*, fmt.Errorf" --include="*.go" . | grep -v "_test.go" | wc -l)
        ERROR_TESTED=$(grep -r "return .* error" --include="*_test.go" . | wc -l)

        echo "Error handlers in code: $ERROR_HANDLERS"
        echo "Error checks in tests: $ERROR_TESTS"
        echo "Error returns in code: $ERROR_FORCED"
        echo "Error tests: $ERROR_TESTED"
        echo ""

        # Check for context cancellation tests
        echo "Checking for context cancellation tests..."
        CTX_USES=$(grep -r "ctx context.Context" --include="*.go" . | grep -v "_test.go" | wc -l)
        CTX_TESTS=$(grep -r "context.WithCancel\|context.WithTimeout\|context.WithDeadline" --include="*_test.go" . | wc -l)

        echo "Context params in code: $CTX_USES"
        echo "Context cancellation tests: $CTX_TESTS"
        echo ""

        # Check for mocking usage
        echo "Checking for mocking usage..."
        INTERFACES=$(grep -r "type [A-Z].*interface" --include="*.go" . | grep -v "_test.go" | wc -l)
        MOCKS=$(grep -r "mock\|Mock" --include="*_test.go" . | wc -l)

        echo "Interfaces defined: $INTERFACES"
        echo "Mock usage in tests: $MOCKS"
        echo ""

        echo "Analyzing test quality for working packages..."
        # Check for specific testing practices in working packages
        WORKING_PACKAGES=(
          "./pkg/providers"
          "./pkg/providers/openai"
          "./tools"
        )

        for pkg in "${WORKING_PACKAGES[@]}"; do
          echo "=== Test quality for $pkg ==="
          # Check for table-driven tests
          TABLE_TESTS=$(grep -r "range.*cases\|range.*tests\|for _, tc := range\|for _, tt :=" --include="*_test.go" "$pkg" | wc -l)
          echo "Table-driven tests: $TABLE_TESTS"

          # Check for assertions
          ASSERTIONS=$(grep -r "assert\|t.Error\|t.Fatal\|t.Log" --include="*_test.go" "$pkg" | wc -l)
          echo "Test assertions: $ASSERTIONS"

          # Check for setup/teardown
          SETUP=$(grep -r "func setup\|func teardown\|BeforeEach\|AfterEach" --include="*_test.go" "$pkg" | wc -l)
          echo "Setup/teardown: $SETUP"
          echo ""
        done
  
  test:coverage:badge:
    desc: Generate a test coverage badge SVG for working packages
    cmds:
      - mkdir -p ./coverage
      - |
        # Initialize the coverage file with mode: set
        echo "mode: set" > ./coverage/working.out
        
        # Manually specify the packages we know are working
        WORKING_PACKAGES=(
          "github.com/blockhead-consulting/guild/pkg/providers"
          "github.com/blockhead-consulting/guild/pkg/providers/openai"
          "github.com/blockhead-consulting/guild/tools"
        )
        
        for pkg in "${WORKING_PACKAGES[@]}"; do
          echo "Testing $pkg"
          # Run test with coverage
          if go test -coverprofile=./coverage/temp.out "$pkg"; then
            echo "✅ $pkg"
            # Append to coverage file, skipping the mode line
            tail -n +2 ./coverage/temp.out >> ./coverage/working.out
          else
            echo "❌ $pkg failed"
          fi
        done
        
        # Calculate coverage
        COVERAGE=$(go tool cover -func=./coverage/working.out | grep total | awk '{print $3}' | tr -d '%')
        
        # Determine color based on coverage percentage
        if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
        elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="green"
        elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellowgreen"
        elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then
            COLOR="yellow"
        elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
        else
            COLOR="red"
        fi
        
        # Create badge URL
        BADGE_URL="https://img.shields.io/badge/coverage-$COVERAGE%25-$COLOR"
        
        # Download the badge SVG
        curl -s "$BADGE_URL" > ./coverage/coverage-badge.svg
        
        echo "Coverage badge generated at ./coverage/coverage-badge.svg"
        echo "Add this to your README.md:"
        echo "[![Test Coverage](./coverage/coverage-badge.svg)](./coverage/working.html)"
        
        # Cleanup
        rm -f ./coverage/temp.out

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - go fmt ./...
      - |
        # Check for any unformatted files
        UNFORMATTED=$(gofmt -l .)
        if [ -n "$UNFORMATTED" ]; then
          echo "ERROR: The following files are not properly formatted:"
          echo "$UNFORMATTED"
          exit 1
        fi
        echo "✅ All files properly formatted"
      - |
        if command -v golangci-lint >/dev/null 2>&1; then
          golangci-lint run
        else
          echo "golangci-lint not found, skipping advanced linting"
        fi
      - |
        # Check for stray binaries
        STRAY_BINARIES=$(find . -type f -name "guild" -o -name "*.exe" | grep -v bin/ | head -5)
        if [ -n "$STRAY_BINARIES" ]; then
          echo "ERROR: Found stray binaries outside bin/ directory:"
          echo "$STRAY_BINARIES"
          exit 1
        fi
        echo "✅ No stray binaries found"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -rf ./coverage
      - rm -f ./guild  # Remove any binary in root directory
      - go clean -testcache
      - go clean -cache

  version:
    desc: Display Guild version
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} version"
    deps: [build]

  verify:
    desc: Verify build and basic functionality
    deps: [build]
    cmds:
      - |
        echo "Verifying Guild binary..."
        if [ ! -f "{{.BIN_DIR}}/{{.MAIN_BIN}}" ]; then
          echo "ERROR: Binary not found at {{.BIN_DIR}}/{{.MAIN_BIN}}"
          exit 1
        fi
        echo "✅ Binary exists"
        
        # Test that the binary runs without crashing
        if {{.BIN_DIR}}/{{.MAIN_BIN}} --help > /dev/null 2>&1; then
          echo "✅ Binary runs and shows help"
        else
          echo "ERROR: Binary failed to run or show help"
          exit 1
        fi
        
        echo "✅ Build verification complete"

  build:all:
    desc: Build everything and verify
    deps: [clean, build, verify]
    cmds:
      - echo "✅ Complete build and verification finished"

  test:race:
    desc: Run tests with race detection
    cmds:
      - go test -race ./...

  test:timeout:
    desc: Run tests with timeout to catch hanging tests
    cmds:
      - go test -timeout=2m ./...

  test:full:
    desc: Run comprehensive test suite
    deps: [test:race, test:timeout, lint]
    cmds:
      - echo "✅ Full test suite completed"

  deps:install:
    desc: Install required dependencies
    cmds:
      - |
        echo "Installing build dependencies..."
        # ZeroMQ dependency (used for communication)
        if [[ "$OSTYPE" == "darwin"* ]]; then
          brew install zeromq
        elif [[ "$OSTYPE" == "linux-gnu"* ]]; then
          sudo apt-get update && sudo apt-get install -y libzmq3-dev
        else
          echo "Please install ZeroMQ manually for your platform"
        fi
        go mod download
        go mod tidy

  agent:start:
    desc: Start a specific agent or all agents
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} agent start{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}"
    interactive: true

  objective:create:
    desc: Create a new objective
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} objective create {{.CLI_ARGS}}"
    interactive: true

  objective:list:
    desc: List all objectives
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} objective list"

  objective:view:
    desc: View an objective
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} objective view {{.CLI_ARGS}}"

  objective:ui:
    desc: Launch the objective UI
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.MAIN_BIN}} objective ui"
    interactive: true

  ui:dev:setup:
    desc: Setup development environment for the Guild Hall UI (Bubble Tea)
    cmds:
      - |
        echo "🏰 Setting up the Guild Hall UI development environment..."

        # Check if required dependencies are installed
        if ! go list -m github.com/charmbracelet/bubbletea &>/dev/null; then
          echo "Installing Bubble Tea (Guild Hall TUI framework)..."
          go get github.com/charmbracelet/bubbletea@latest
        fi

        if ! go list -m github.com/charmbracelet/bubbles &>/dev/null; then
          echo "Installing Bubbles (Guild Hall UI components)..."
          go get github.com/charmbracelet/bubbles@latest
        fi

        # Already have lipgloss but check version
        if go list -m github.com/charmbracelet/lipgloss &>/dev/null; then
          echo "Lipgloss already installed (Guild Hall styling library)"
        else
          echo "Installing Lipgloss (Guild Hall styling library)..."
          go get github.com/charmbracelet/lipgloss@latest
        fi

        echo "✅ Guild Hall UI dependencies are ready!"

  ui:dev:run:
    desc: Run the Guild Hall UI in development mode with hot reloading
    cmds:
      - |
        echo "🏰 Launching Guild Hall UI in Craftsman's Workshop (dev mode)..."

        # Check if air is installed (for hot reloading)
        if ! command -v air &>/dev/null; then
          echo "Installing air for hot reloading..."
          go install github.com/cosmtrek/air@latest
        fi

        # Create temporary air config if it doesn't exist
        if [ ! -f .air.toml ]; then
          cat > .air.toml << EOF
        root = "."
        tmp_dir = "tmp"

        [build]
        cmd = "go build -o ./tmp/guild_hall ./cmd/guild"
        bin = "./tmp/guild_hall"
        full_bin = "./tmp/guild_hall objective ui"
        include_ext = ["go"]
        exclude_dir = ["tmp", "vendor", "test_data"]
        delay = 1000

        [screen]
        clear_on_rebuild = true
        keep_scroll = true
        EOF
        fi

        # Run with air
        air
    interactive: true

  ui:test:
    desc: Test the Guild Hall UI components
    cmds:
      - |
        echo "⚔️ Testing the Guild Hall UI components..."

        # Setup specific environment variables for UI testing
        UI_TEST_MODE=1 go test ./pkg/ui/... -v

        echo "Testing medieval theme consistency in UI code..."
        LORE_TERMS=(
          "Guild" "Hall" "Chamber" "Workshop" "Craftsman" "Artisan"
          "Master" "Journeyman" "Apprentice" "Ledger" "Craft"
        )

        UI_FILES=$(find ./pkg/ui -name "*.go" | grep -v "_test.go")
        TERM_COUNT=0

        echo "Checking UI components for Guild lore terminology..."
        for term in "${LORE_TERMS[@]}"; do
          COUNT=$(grep -c "$term" $UI_FILES || echo 0)
          TERM_COUNT=$((TERM_COUNT + COUNT))
          echo "- $term: $COUNT occurrences"
        done

        echo "Total lore terminology in UI: $TERM_COUNT occurrences"

        # Suggest improvements if needed
        if [ $TERM_COUNT -lt 10 ]; then
          echo "⚠️ The Guild Hall UI could use more themed terminology!"
          echo "Suggestion: Consider renaming UI components to use Guild lore-inspired names."
        else
          echo "✅ The Guild Hall UI embraces the Guild lore!"
        fi

  ui:docs:generate:
    desc: Generate documentation for the Guild Hall UI (with lore)
    cmds:
      - |
        echo "📜 Generating Guild Hall UI documentation..."
        mkdir -p ./docs/ui

        # Generate component documentation
        cat > ./docs/ui/guild_hall.md << EOF
        # Guild Hall Interface 🏰

        The Guild Hall is the central gathering place where Guild Masters oversee objectives,
        Journeymen track progress, and Apprentices learn the craft of collaboration.

        ## UI Structure and Metaphor

        Our terminal user interface follows medieval guild architecture:

        | UI Section | Guild Metaphor | Purpose |
        |------------|---------------|---------|
        | Header | Guild Banner | Shows title and status |
        | Navigation | Hall Corridors | Move between sections |
        | Objective List | Guild Ledger | Records all objectives |
        | Task Board | Workshop Wall | Displays Kanban tasks |
        | Command Bar | Master's Orders | Available commands |
        | Status Line | Town Crier | Important messages |

        ## Components

        - **Hall Entrance**: Main view and navigation
        - **Guild Ledger**: Objective listing and management
        - **Craftsman's Board**: Task assignment and tracking
        - **Master's Chambers**: Configuration and settings
        - **Apprentice's Corner**: Help and documentation

        ## Theme

        The UI uses a carefully crafted color palette inspired by medieval manuscripts and guild halls:

        - Primary: Deep burgundy (#8B0000) - The color of the Guild Master's robes
        - Secondary: Aged parchment (#F5F5DC) - The color of guild records
        - Accent: Metallic gold (#D4AF37) - The guild's official seal
        - Background: Dark oak (#3E2723) - The wooden panels of the guild hall
        - Text: Ivory (#FFFFF0) - The quill-written text on parchments

        ## Keyboard Commands

        | Key | Guild Action | Effect |
        |-----|-------------|--------|
        | h,j,k,l | Journeyman's Steps | Navigate within views |
        | q | Leave the Hall | Exit the interface |
        | ? | Consult the Master | Show help |
        | c | Create a Record | New objective/task |
        | e | Amend a Record | Edit selected item |
        | Space | Master's Approval | Select/confirm action |

        EOF

        echo "✅ Guild Hall UI documentation generated at ./docs/ui/guild_hall.md"

  ui:scaffold:
    desc: Generate a Guild-themed Bubble Tea UI component scaffold
    cmds:
      - |
        if [ -z "{{.COMPONENT}}" ]; then
          echo "Error: COMPONENT parameter is required"
          echo "Usage: task ui:scaffold COMPONENT=component_name TYPE=chamber|hall|workshop|ledger"
          echo "Example: task ui:scaffold COMPONENT=task_list TYPE=ledger"
          exit 1
        fi

        # Default type is chamber if not specified
        COMPONENT_TYPE="{{.TYPE}}"
        if [ -z "$COMPONENT_TYPE" ]; then
          COMPONENT_TYPE="chamber"
        fi

        # Validate component type
        if [[ ! "$COMPONENT_TYPE" =~ ^(chamber|hall|workshop|ledger)$ ]]; then
          echo "Error: TYPE must be one of: chamber, hall, workshop, ledger"
          exit 1
        fi

        # Convert component name to snake_case
        COMPONENT_NAME="{{.COMPONENT}}"
        COMPONENT_SNAKE=$(echo "$COMPONENT_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')

        # Convert component name to CamelCase for Go
        COMPONENT_CAMEL=$(echo "$COMPONENT_NAME" | awk -F'_' '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1)) substr($i,2)}}1' | tr -d ' ')

        echo "🏰 Generating Guild UI component: $COMPONENT_CAMEL ($COMPONENT_TYPE)"

        # Create component directory if it doesn't exist
        mkdir -p "./pkg/ui/components/$COMPONENT_SNAKE"

        # Generate model file
        cat > "./pkg/ui/components/$COMPONENT_SNAKE/model.go" << EOF
        package ${COMPONENT_SNAKE}

        import (
        	"github.com/charmbracelet/bubbles/key"
        	"github.com/charmbracelet/bubbles/viewport"
        	tea "github.com/charmbracelet/bubbletea"
        	"github.com/charmbracelet/lipgloss"
        )

        // ${COMPONENT_CAMEL} represents a $COMPONENT_TYPE in the Guild Hall.
        // It manages the state and rendering of the ${COMPONENT_NAME} component.
        type ${COMPONENT_CAMEL} struct {
        	viewport    viewport.Model
        	keys        ${COMPONENT_CAMEL}KeyMap
        	styles      ${COMPONENT_CAMEL}Styles
        	title       string
        	description string
        	focused     bool
        	height      int
        	width       int
        }

        // ${COMPONENT_CAMEL}KeyMap defines the key bindings for the ${COMPONENT_CAMEL} component.
        type ${COMPONENT_CAMEL}KeyMap struct {
        	Up    key.Binding
        	Down  key.Binding
        	Enter key.Binding
        	Back  key.Binding
        }

        // DefaultKeys returns the default key bindings for the ${COMPONENT_CAMEL}.
        func DefaultKeys() ${COMPONENT_CAMEL}KeyMap {
        	return ${COMPONENT_CAMEL}KeyMap{
        		Up: key.NewBinding(
        			key.WithKeys("up", "k"),
        			key.WithHelp("↑/k", "move up"),
        		),
        		Down: key.NewBinding(
        			key.WithKeys("down", "j"),
        			key.WithHelp("↓/j", "move down"),
        		),
        		Enter: key.NewBinding(
        			key.WithKeys("enter"),
        			key.WithHelp("enter", "select"),
        		),
        		Back: key.NewBinding(
        			key.WithKeys("esc"),
        			key.WithHelp("esc", "back"),
        		),
        	}
        }

        // ${COMPONENT_CAMEL}Styles defines the visual styles for the ${COMPONENT_CAMEL} component.
        type ${COMPONENT_CAMEL}Styles struct {
        	Base      lipgloss.Style
        	Title     lipgloss.Style
        	Normal    lipgloss.Style
        	Focused   lipgloss.Style
        	Highlight lipgloss.Style
        }

        // DefaultStyles returns the default styles for the ${COMPONENT_CAMEL}.
        func DefaultStyles() ${COMPONENT_CAMEL}Styles {
        	// Colors inspired by medieval guild themes
        	var (
        		burgundy    = lipgloss.Color("#8B0000") // Guild Master's robes
        		parchment   = lipgloss.Color("#F5F5DC") // Guild records
        		gold        = lipgloss.Color("#D4AF37") // Guild seal
        		darkOak     = lipgloss.Color("#3E2723") // Guild hall panels
        		ivory       = lipgloss.Color("#FFFFF0") // Parchment text
        	)

        	return ${COMPONENT_CAMEL}Styles{
        		Base: lipgloss.NewStyle().
        			BorderStyle(lipgloss.RoundedBorder()).
        			BorderForeground(burgundy).
        			Padding(1, 2),
        		Title: lipgloss.NewStyle().
        			Foreground(gold).
        			Bold(true),
        		Normal: lipgloss.NewStyle().
        			Foreground(ivory).
        			Background(darkOak),
        		Focused: lipgloss.NewStyle().
        			Foreground(darkOak).
        			Background(parchment).
        			Bold(true),
        		Highlight: lipgloss.NewStyle().
        			Foreground(parchment).
        			Background(burgundy),
        	}
        }

        // New${COMPONENT_CAMEL} creates a new ${COMPONENT_CAMEL} component.
        func New${COMPONENT_CAMEL}() ${COMPONENT_CAMEL} {
        	return ${COMPONENT_CAMEL}{
        		viewport: viewport.New(0, 0),
        		keys:     DefaultKeys(),
        		styles:   DefaultStyles(),
        		title:    "${COMPONENT_TYPE} of $COMPONENT_NAME",
        		focused:  false,
        	}
        }

        // SetSize sets the size of the ${COMPONENT_CAMEL} component.
        func (m *${COMPONENT_CAMEL}) SetSize(width, height int) {
        	m.width = width
        	m.height = height
        	m.viewport.Width = width - m.styles.Base.GetHorizontalFrameSize()
        	m.viewport.Height = height - m.styles.Base.GetVerticalFrameSize()
        }

        // Focus focuses the ${COMPONENT_CAMEL} component.
        func (m *${COMPONENT_CAMEL}) Focus() {
        	m.focused = true
        }

        // Blur blurs the ${COMPONENT_CAMEL} component.
        func (m *${COMPONENT_CAMEL}) Blur() {
        	m.focused = false
        }

        // Init initializes the ${COMPONENT_CAMEL} component.
        func (m ${COMPONENT_CAMEL}) Init() tea.Cmd {
        	// Return any initial commands for this component
        	return nil
        }

        // Update handles messages and user input for the ${COMPONENT_CAMEL} component.
        func (m ${COMPONENT_CAMEL}) Update(msg tea.Msg) (${COMPONENT_CAMEL}, tea.Cmd) {
        	var (
        		cmd  tea.Cmd
        		cmds []tea.Cmd
        	)

        	switch msg := msg.(type) {
        	case tea.KeyMsg:
        		// Handle keys only when focused
        		if !m.focused {
        			break
        		}

        		switch {
        		case key.Matches(msg, m.keys.Up):
        			m.viewport, cmd = m.viewport.Update(msg)
        			cmds = append(cmds, cmd)

        		case key.Matches(msg, m.keys.Down):
        			m.viewport, cmd = m.viewport.Update(msg)
        			cmds = append(cmds, cmd)

        		case key.Matches(msg, m.keys.Enter):
        			// Handle selection
        			// Add your enter key logic here

        		case key.Matches(msg, m.keys.Back):
        			// Handle back
        			// Add your back logic here
        		}

        	case tea.WindowSizeMsg:
        		m.SetSize(msg.Width, msg.Height)
        	}

        	// Always update the viewport
        	m.viewport, cmd = m.viewport.Update(msg)
        	cmds = append(cmds, cmd)

        	return m, tea.Batch(cmds...)
        }

        // View renders the ${COMPONENT_CAMEL} component.
        func (m ${COMPONENT_CAMEL}) View() string {
        	baseStyle := m.styles.Base
        	if m.focused {
        		baseStyle = baseStyle.BorderForeground(m.styles.Highlight.GetBackground())
        	}

        	return baseStyle.Render(
        		lipgloss.JoinVertical(
        			lipgloss.Left,
        			m.styles.Title.Render(m.title),
        			m.viewport.View(),
        		),
        	)
        }
        EOF

        # Generate test file
        cat > "./pkg/ui/components/$COMPONENT_SNAKE/${COMPONENT_SNAKE}_test.go" << EOF
        package ${COMPONENT_SNAKE}

        import (
        	"testing"

        	tea "github.com/charmbracelet/bubbletea"
        )

        // TestCraft${COMPONENT_CAMEL} tests the creation of the ${COMPONENT_CAMEL} component.
        func TestCraft${COMPONENT_CAMEL}(t *testing.T) {
        	model := New${COMPONENT_CAMEL}()

        	if model.title == "" {
        		t.Errorf("Expected title to be set, got empty string")
        	}

        	if model.viewport.Width != 0 || model.viewport.Height != 0 {
        		t.Errorf("Expected viewport size to be (0,0), got (%d,%d)",
        			model.viewport.Width, model.viewport.Height)
        	}
        }

        // TestGuild${COMPONENT_CAMEL}Sizing tests the sizing behavior of the ${COMPONENT_CAMEL} component.
        func TestGuild${COMPONENT_CAMEL}Sizing(t *testing.T) {
        	model := New${COMPONENT_CAMEL}()

        	model.SetSize(80, 24)

        	expectedViewportWidth := 80 - model.styles.Base.GetHorizontalFrameSize()
        	expectedViewportHeight := 24 - model.styles.Base.GetVerticalFrameSize()

        	if model.viewport.Width != expectedViewportWidth ||
        	   model.viewport.Height != expectedViewportHeight {
        		t.Errorf("Expected viewport size to be (%d,%d), got (%d,%d)",
        			expectedViewportWidth, expectedViewportHeight,
        			model.viewport.Width, model.viewport.Height)
        	}
        }

        // TestJourneyman${COMPONENT_CAMEL}Focus tests focus management of the ${COMPONENT_CAMEL} component.
        func TestJourneyman${COMPONENT_CAMEL}Focus(t *testing.T) {
        	model := New${COMPONENT_CAMEL}()

        	// Should start unfocused
        	if model.focused {
        		t.Errorf("Expected component to start unfocused")
        	}

        	// Focus the component
        	model.Focus()
        	if !model.focused {
        		t.Errorf("Expected component to be focused after Focus()")
        	}

        	// Blur the component
        	model.Blur()
        	if model.focused {
        		t.Errorf("Expected component to be unfocused after Blur()")
        	}
        }

        // TestApprentice${COMPONENT_CAMEL}InvalidInput tests handling of invalid input.
        func TestApprentice${COMPONENT_CAMEL}InvalidInput(t *testing.T) {
        	model := New${COMPONENT_CAMEL}()

        	// Test with nil message (should not panic)
        	_, _ = model.Update(nil)

        	// Test with unexpected message type (should not panic)
        	_, _ = model.Update("unexpected string message")
        }
        EOF

        echo "✅ Generated Guild Hall UI component: ${COMPONENT_CAMEL}"
        echo "   Files created:"
        echo "   - pkg/ui/components/$COMPONENT_SNAKE/model.go"
        echo "   - pkg/ui/components/$COMPONENT_SNAKE/${COMPONENT_SNAKE}_test.go"
        echo ""
        echo "   This component represents a $COMPONENT_TYPE in the Guild Hall."
        echo "   Use 'task ui:dev:run' to see it in action once integrated."

  ui:styleguide:
    desc: Generate a Guild Hall UI style guide with medieval themes
    cmds:
      - |
        echo "📜 Generating Guild Hall UI Style Guide..."
        mkdir -p ./docs/ui

        # Generate style guide file with Guild lore styling
        cat > ./docs/ui/styleguide.md << EOF
        # Guild Hall UI Style Guide 🏰

        This document defines the visual language and interaction patterns for the Guild Terminal User Interface.
        All UI components should adhere to these guidelines to maintain a cohesive medieval guild aesthetic.

        ## Design Principles

        1. **Craft Excellence**: Every UI element should be crafted with care and attention to detail
        2. **Guild Heritage**: UI metaphors should reflect medieval guild structures and practices
        3. **Master's Wisdom**: Interface should be intuitive while revealing depth with experience
        4. **Apprentice Accessibility**: Core functions must be understandable to newcomers
        5. **Journeyman's Efficiency**: Advanced workflows should be optimized for speed

        ## Color Palette

        Our Guild Hall palette draws from authentic medieval colors and materials:

        ### Primary Colors

        \`\`\`go
        // Primary colors (to be used in lipgloss styles)
        burgundy := lipgloss.Color("#8B0000") // Guild Master's robes
        parchment := lipgloss.Color("#F5F5DC") // Guild records
        gold := lipgloss.Color("#D4AF37") // Guild seal
        darkOak := lipgloss.Color("#3E2723") // Guild hall panels
        ivory := lipgloss.Color("#FFFFF0") // Parchment text
        \`\`\`

        ### Supporting Colors

        \`\`\`go
        // Supporting colors for specific states
        emerald := lipgloss.Color("#2E8B57") // Success/completion
        sapphire := lipgloss.Color("#0067A5") // Information/links
        ruby := lipgloss.Color("#9B111E") // Errors/warnings
        amethyst := lipgloss.Color("#5D3954") // Special/magic actions
        \`\`\`

        ## Typography

        Guild interfaces use a consistent typography system:

        - **Titles**: Bold, gold text for main headers
        - **Subtitles**: Bold, ivory text for section headers
        - **Body**: Regular ivory text for content
        - **Annotations**: Italicized or dimmed text for additional information
        - **Highlights**: Bold, contrasting text for important elements

        ## Standard Component Styles

        ### Borders and Containers

        All containers in the Guild Hall should use consistent border styles:

        \`\`\`go
        // Hall (primary container)
        hallStyle := lipgloss.NewStyle().
            BorderStyle(lipgloss.DoubleBorder()).
            BorderForeground(burgundy).
            Padding(1, 2)

        // Chamber (secondary container)
        chamberStyle := lipgloss.NewStyle().
            BorderStyle(lipgloss.RoundedBorder()).
            BorderForeground(gold).
            Padding(1, 2)

        // Workshop (content container)
        workshopStyle := lipgloss.NewStyle().
            BorderStyle(lipgloss.NormalBorder()).
            BorderForeground(darkOak).
            Padding(0, 1)

        // Scroll (list/text container)
        scrollStyle := lipgloss.NewStyle().
            BorderStyle(lipgloss.HiddenBorder()).
            Padding(0, 1)
        \`\`\`

        ### Interactive Elements

        Interactive elements follow a consistent visual language:

        \`\`\`go
        // Button (interactive element)
        buttonStyle := lipgloss.NewStyle().
            Border(lipgloss.NormalBorder()).
            BorderForeground(gold).
            Foreground(ivory).
            Background(burgundy).
            Padding(0, 3)

        // Selected item
        selectedStyle := lipgloss.NewStyle().
            Foreground(darkOak).
            Background(parchment).
            Bold(true)

        // Inactive/disabled item
        inactiveStyle := lipgloss.NewStyle().
            Foreground(lipgloss.Color("#727272")).
            Italic(true)
        \`\`\`

        ## Component Guide

        Each component should be named following Guild metaphors:

        | Component Type | Guild Metaphor | Example |
        |----------------|---------------|---------|
        | Main View | Hall | \`GuildHall\`, \`TreasuryHall\` |
        | Section | Chamber | \`PlanningChamber\`, \`ArchiveChamber\` |
        | Interactive Area | Workshop | \`TaskWorkshop\`, \`CodeWorkshop\` |
        | Data Display | Ledger | \`ObjectiveLedger\`, \`CostLedger\` |
        | Controls | Tools | \`NavigationTools\`, \`FilteringTools\` |

        ## Animation and Interaction

        Animations should be subtle and reflect medieval craftsmanship:

        - Use wipes and fades rather than modern transitions
        - Progress indicators should resemble hourglasses or similar period-appropriate concepts
        - Loading spinners should evoke spinning wheels or other craft tools

        ## Voice and Tone

        UI text should maintain medieval guild terminology:

        | Modern Term | Guild Term |
        |-------------|------------|
        | Create | Craft |
        | View | Examine |
        | Edit | Amend |
        | Delete | Discard |
        | Settings | Master's Orders |
        | Help | Apprentice's Guide |
        | Filter | Separate |
        | Sort | Arrange |

        ## Implementation Example

        Here's an example of a compliant UI component implementation:

        \`\`\`go
        // GuildLedger represents a list of records in the guild system
        type GuildLedger struct {
            title     string
            list      list.Model
            styles    LedgerStyles
            focused   bool
        }

        // LedgerStyles contains the styles for the GuildLedger component
        type LedgerStyles struct {
            Base      lipgloss.Style
            Title     lipgloss.Style
            Item      lipgloss.Style
            Selected  lipgloss.Style
            Empty     lipgloss.Style
        }

        // DefaultLedgerStyles returns Guild-themed styles for the ledger
        func DefaultLedgerStyles() LedgerStyles {
            return LedgerStyles{
                Base: lipgloss.NewStyle().
                    BorderStyle(lipgloss.RoundedBorder()).
                    BorderForeground(lipgloss.Color("#8B0000")).
                    Padding(1, 2),
                Title: lipgloss.NewStyle().
                    Foreground(lipgloss.Color("#D4AF37")).
                    Bold(true),
                Item: lipgloss.NewStyle().
                    Foreground(lipgloss.Color("#FFFFF0")),
                Selected: lipgloss.NewStyle().
                    Foreground(lipgloss.Color("#3E2723")).
                    Background(lipgloss.Color("#F5F5DC")).
                    Bold(true),
                Empty: lipgloss.NewStyle().
                    Foreground(lipgloss.Color("#727272")).
                    Italic(true),
            }
        }
        \`\`\`

        ## Accessibility

        While maintaining medieval aesthetics, ensure:

        - Color combinations meet minimum contrast requirements
        - All interactions are keyboard accessible
        - Status information is clearly communicated
        - Critical actions have confirmation steps

        ## TUI Testing

        All Guild Hall UI components should be tested using the \`ui:test\` task, which verifies:

        - Proper Guild terminology is used consistently
        - Components render as expected
        - Keyboard interactions work correctly
        - Focus management functions properly
        - Components handle error states gracefully

        Remember that a well-crafted Guild Hall interface embodies the spirit of medieval craftspeople while providing modern functionality.
        EOF

        echo "✅ Guild Hall UI Style Guide generated at ./docs/ui/styleguide.md"

  ui:demo:
    desc: Generate and run a demo of the Guild Hall UI
    cmds:
      - |
        echo "🏰 Creating Guild Hall UI demo..."

        # Create a demo directory if it doesn't exist
        mkdir -p ./cmd/demos/guild_hall

        # Generate a simple standalone demo
        cat > ./cmd/demos/guild_hall/main.go << EOF
        package main

        import (
            "fmt"
            "os"

            "github.com/charmbracelet/bubbles/list"
            "github.com/charmbracelet/bubbles/viewport"
            tea "github.com/charmbracelet/bubbletea"
            "github.com/charmbracelet/lipgloss"
        )

        // Colors inspired by medieval guild themes
        var (
            burgundy  = lipgloss.Color("#8B0000") // Guild Master's robes
            parchment = lipgloss.Color("#F5F5DC") // Guild records
            gold      = lipgloss.Color("#D4AF37") // Guild seal
            darkOak   = lipgloss.Color("#3E2723") // Guild hall panels
            ivory     = lipgloss.Color("#FFFFF0") // Parchment text
            emerald   = lipgloss.Color("#2E8B57") // Success states
            ruby      = lipgloss.Color("#9B111E") // Error states
        )

        // UI Styles for the Guild Hall demo
        var (
            // Main container style (Guild Hall)
            hallStyle = lipgloss.NewStyle().
                BorderStyle(lipgloss.DoubleBorder()).
                BorderForeground(burgundy).
                Padding(1, 2)

            // Section container style (Guild Chamber)
            chamberStyle = lipgloss.NewStyle().
                BorderStyle(lipgloss.RoundedBorder()).
                BorderForeground(gold).
                Padding(1, 2)

            // Title style
            titleStyle = lipgloss.NewStyle().
                Foreground(gold).
                Bold(true).
                Padding(0, 1)

            // Normal text style
            textStyle = lipgloss.NewStyle().
                Foreground(ivory)

            // Selected text style
            selectedStyle = lipgloss.NewStyle().
                Foreground(darkOak).
                Background(parchment).
                Bold(true)

            // Status style
            statusStyle = lipgloss.NewStyle().
                Foreground(parchment).
                Background(burgundy).
                Padding(0, 1)
        )

        // Item represents an item in our demo list
        type item struct {
            title       string
            description string
            status      string
        }

        // FilterValue implements the list.Item interface
        func (i item) FilterValue() string { return i.title }

        // Title returns the item's title
        func (i item) Title() string { return i.title }

        // Description returns the item's description
        func (i item) Description() string { return i.description }

        // GuildHall is our main UI model
        type GuildHall struct {
            objectives list.Model
            details    viewport.Model
            selected   string
            width      int
            height     int
        }

        // createDemoItems creates some demo items with Guild theme
        func createDemoItems() []list.Item {
            return []list.Item{
                item{
                    title:       "Guild Charter: Framework Development",
                    description: "Establish the core framework for Guild operations",
                    status:      "in_progress",
                },
                item{
                    title:       "Guild Treasury: Cost Management",
                    description: "Implement token tracking and optimization",
                    status:      "pending",
                },
                item{
                    title:       "Craftsmen Workshop: Vector Store",
                    description: "Develop the vector storage system for Guild memory",
                    status:      "in_progress",
                },
                item{
                    title:       "Master's Directive: CLI Tools",
                    description: "Create CLI tools for Guild interaction",
                    status:      "completed",
                },
                item{
                    title:       "Journeyman's Task: Documentation",
                    description: "Write comprehensive documentation for Guild users",
                    status:      "pending",
                },
            }
        }

        // Initialize creates our initial model
        func Initialize() *GuildHall {
            // Create the list of objectives
            items := createDemoItems()
            l := list.New(items, list.NewDefaultDelegate(), 0, 0)
            l.Title = "Guild Objectives Ledger"
            l.SetShowStatusBar(false)
            l.SetFilteringEnabled(false)
            l.Styles.Title = titleStyle
            l.Styles.TitleBar = titleStyle

            // Create the details viewport
            d := viewport.New(0, 0)
            d.Style = textStyle

            return &GuildHall{
                objectives: l,
                details:    d,
                selected:   "",
            }
        }

        // Init initializes the model
        func (m GuildHall) Init() tea.Cmd {
            return nil
        }

        // Update handles UI messages
        func (m GuildHall) Update(msg tea.Msg) (tea.Model, tea.Cmd) {
            var (
                cmd  tea.Cmd
                cmds []tea.Cmd
            )

            switch msg := msg.(type) {
            case tea.WindowSizeMsg:
                m.width = msg.Width
                m.height = msg.Height

                // Reserve room for the status bar
                statusHeight := 1
                mainHeight := m.height - statusHeight

                // Left panel gets 40% of the width
                leftWidth := m.width * 40 / 100
                rightWidth := m.width - leftWidth - 5 // 5 for padding/border

                m.objectives.SetWidth(leftWidth)
                m.objectives.SetHeight(mainHeight)

                m.details.Width = rightWidth
                m.details.Height = mainHeight

                // If we have selection, update viewport content
                if i, ok := m.objectives.SelectedItem().(item); ok {
                    m.selected = i.title
                    m.updateDetailsContent(i)
                }

            case tea.KeyMsg:
                switch msg.String() {
                case "q", "ctrl+c":
                    return m, tea.Quit
                }

                // Handle list key presses
                if m.objectives.FilterState() != list.Filtering {
                    prevSelection := ""
                    if i, ok := m.objectives.SelectedItem().(item); ok {
                        prevSelection = i.title
                    }

                    // Let the list handle the key press
                    m.objectives, cmd = m.objectives.Update(msg)
                    cmds = append(cmds, cmd)

                    // If selection changed, update details
                    if i, ok := m.objectives.SelectedItem().(item); ok && i.title != prevSelection {
                        m.selected = i.title
                        m.updateDetailsContent(i)
                    }
                }

                // Let the details viewport handle scrolling
                m.details, cmd = m.details.Update(msg)
                cmds = append(cmds, cmd)
            }

            return m, tea.Batch(cmds...)
        }

        // updateDetailsContent updates the content in the details panel
        func (m *GuildHall) updateDetailsContent(i item) {
            // Simulate a detailed objective content
            content := fmt.Sprintf(
                "%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n",
                titleStyle.Render("📜 "+i.title),
                textStyle.Render("Description:"),
                textStyle.Render("  "+i.description),
                textStyle.Render("Status:"),
                getStatusStyle(i.status).Render("  "+i.status),
                textStyle.Render("Guild Master:"),
                textStyle.Render("  Master Craftsman Claude"),
                textStyle.Render("This objective seeks to advance the Guild's capabilities through diligent craft and dedicated artisanship. The work shall be conducted according to the ancient traditions of guild practice, with attention to detail and commitment to excellence."),
            )
            m.details.SetContent(content)
        }

        // getStatusStyle returns a style based on status
        func getStatusStyle(status string) lipgloss.Style {
            switch status {
            case "completed":
                return lipgloss.NewStyle().
                    Foreground(emerald).
                    Bold(true)
            case "in_progress":
                return lipgloss.NewStyle().
                    Foreground(gold).
                    Bold(true)
            case "pending":
                return lipgloss.NewStyle().
                    Foreground(ivory)
            default:
                return textStyle
            }
        }

        // View renders the UI
        func (m GuildHall) View() string {
            if m.width == 0 {
                return "Initializing..."
            }

            // Render the left panel (Objectives list)
            leftPanel := chamberStyle.Copy().
                Width(m.objectives.Width()).
                Height(m.objectives.Height()).
                Render(m.objectives.View())

            // Render the right panel (Details panel)
            detailsTitle := titleStyle.Render("Objective Details")
            detailsContent := m.details.View()
            rightPanel := chamberStyle.Copy().
                Width(m.details.Width).
                Height(m.details.Height).
                Render(lipgloss.JoinVertical(
                    lipgloss.Left,
                    detailsTitle,
                    detailsContent,
                ))

            // Combine panels
            mainContent := lipgloss.JoinHorizontal(
                lipgloss.Top,
                leftPanel,
                rightPanel,
            )

            // Add status bar
            statusBar := statusStyle.Copy().
                Width(m.width).
                Render("Press q to exit • arrow keys to navigate • enter to select")

            // Wrap everything in the main hall style
            return hallStyle.Copy().
                Width(m.width - hallStyle.GetHorizontalFrameSize()).
                Height(m.height - hallStyle.GetVerticalFrameSize()).
                Render(lipgloss.JoinVertical(
                    lipgloss.Left,
                    lipgloss.NewStyle().Bold(true).Foreground(gold).Render("🏰 Guild Hall - Objective Management Chamber"),
                    mainContent,
                    statusBar,
                ))
        }

        func main() {
            // Initialize our model
            hall := Initialize()

            // Start the Bubble Tea program
            p := tea.NewProgram(hall, tea.WithAltScreen())
            if _, err := p.Run(); err != nil {
                fmt.Printf("Error running program: %v", err)
                os.Exit(1)
            }
        }
        EOF

        # Update go.mod if needed
        if ! grep -q "github.com/charmbracelet/bubbletea" go.mod; then
          go get github.com/charmbracelet/bubbletea@latest
        fi

        if ! grep -q "github.com/charmbracelet/bubbles" go.mod; then
          go get github.com/charmbracelet/bubbles@latest
        fi

        echo "Building Guild Hall demo..."
        go build -o bin/guild_hall_demo ./cmd/demos/guild_hall

        echo "✅ Guild Hall demo created and built!"
        echo "Running demo..."

        # Run the demo with Alt Screen
        bin/guild_hall_demo
    interactive: true

  test:analyze:lore:
    desc: Analyze test adherence to Guild's lore and naming conventions
    cmds:
      - |
        echo "🏛️ Analyzing test adherence to Guild lore and naming conventions..."

        # Define Guild lore terminology patterns to search for
        GUILD_TERMS=(
          "Guild" "Agent" "Artisan" "Manager" "Apprentice"
          "Craft" "Workshop" "Journeyman" "Master"
          "Hall" "Chamber" "Archive" "Ledger"
        )

        # Check for Guild lore terms usage in test files
        echo "📜 Checking for Guild lore terminology in tests..."
        echo "Term Count"
        echo "---- -----"

        TOTAL_LORE_USAGES=0
        for term in "${GUILD_TERMS[@]}"; do
          COUNT=$(grep -r "$term" --include="*_test.go" . | wc -l)
          printf "%-20s %d\n" "$term" "$COUNT"
          TOTAL_LORE_USAGES=$((TOTAL_LORE_USAGES + COUNT))
        done

        # Check for medieval-themed test function names
        echo -e "\n⚔️ Checking for medieval-themed test function names..."
        THEMED_TEST_FUNCS=$(grep -r "func Test.*Craft\|func Test.*Master\|func Test.*Guild\|func Test.*Artisan\|func Test.*Workshop" --include="*_test.go" . | wc -l)
        echo "Medieval-themed test function names: $THEMED_TEST_FUNCS"

        # Calculate lore adherence percentage for test files
        TOTAL_TEST_FILES=$(find . -name "*_test.go" | wc -l)
        TOTAL_TEST_FUNCS=$(grep -r "^func Test" --include="*_test.go" . | wc -l)

        echo -e "\n📊 Guild Lore Adherence Metrics:"
        echo "Total test files: $TOTAL_TEST_FILES"
        echo "Total test functions: $TOTAL_TEST_FUNCS"
        echo "Total lore terminology usages: $TOTAL_LORE_USAGES"
        echo "Themed test function names: $THEMED_TEST_FUNCS"

        # Calculate adherence percentage
        if [ $TOTAL_TEST_FUNCS -gt 0 ]; then
          THEME_ADHERENCE=$((THEMED_TEST_FUNCS * 100 / TOTAL_TEST_FUNCS))
          echo "Theme adherence percentage: $THEME_ADHERENCE%"

          # Provide recommendations based on adherence
          echo -e "\n📋 Lore Adherence Recommendations:"
          if [ $THEME_ADHERENCE -lt 20 ]; then
            echo "⚠️ Low lore adherence. Consider renaming test functions to follow Guild terminology."
            echo "Suggested terms: GuildMaster, Craftsman, Workshop, Apprentice, Hall, Chamber, Archive"
          elif [ $THEME_ADHERENCE -lt 50 ]; then
            echo "🔄 Moderate lore adherence. Continue improving test names and descriptions."
          else
            echo "✅ Good lore adherence. Maintain consistency with Guild terminology."
          fi
        else
          echo "No test functions found to analyze."
        fi

        # Check naming convention adherence for interface tests
        echo -e "\n🛡️ Checking interface test naming conventions..."
        INTERFACES=$(grep -r "type [A-Z].*interface" --include="*.go" . | grep -v "_test.go" | sed -E 's/.*type ([A-Z][a-zA-Z0-9]*).*/\1/' | sort | uniq)

