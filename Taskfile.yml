        LORE_DESCRIPTIONS=$(grep -r "// Test[A-Z][a-zA-Z0-9]\\+ .\\+\\(Guild\\|Artisan\\|Craft\\|Master\\|Workshop\\)" --include="*_test.go" . | wc -l)

        if [ $TEST_DESCRIPTIONS -gt 0 ]; then
          DESCRIPTION_ADHERENCE=$((LORE_DESCRIPTIONS * 100 / TEST_DESCRIPTIONS))
          echo "Test descriptions: $TEST_DESCRIPTIONS"
          echo "Descriptions using Guild terminology: $LORE_DESCRIPTIONS"
          echo "Description lore adherence: $DESCRIPTION_ADHERENCE%"
        else
          echo "No test descriptions found to analyze."
        fi

  test:lint:naming:
    desc: Lint test functions for naming convention compliance
    cmds:
      - |
        echo "🔍 Linting test functions for Guild naming convention compliance..."
        mkdir -p ./coverage

        # Define expected prefixes for different test types
        declare -A PREFIXES
        PREFIXES=(
          ["test_unit"]="TestCraft"
          ["test_integration"]="TestGuild"
          ["test_mock"]="TestJourneyman"
          ["test_error"]="TestApprentice"
          ["test_benchmark"]="BenchmarkMaster"
        )

        # File to store report
        REPORT_FILE="./coverage/naming_convention_report.txt"
        echo "Guild Test Naming Convention Report" > $REPORT_FILE
        echo "=================================" >> $REPORT_FILE
        echo "Generated on $(date)" >> $REPORT_FILE
        echo "" >> $REPORT_FILE

        # Check all test files
        echo "Scanning test files for naming convention compliance..."

        # Find all test files and count compliant vs non-compliant names
        TEST_FILES=$(find . -name "*_test.go")
        TOTAL_TESTS=0
        COMPLIANT_TESTS=0
        NON_COMPLIANT_TESTS=0

        echo "Non-compliant test function names:" >> $REPORT_FILE
        echo "--------------------------------" >> $REPORT_FILE

        for file in $TEST_FILES; do
          # Get package name
          PACKAGE=$(grep -m 1 "package" "$file" | cut -d ' ' -f 2)
          echo -e "\nFile: $file (Package: $PACKAGE)" >> $REPORT_FILE

          # Extract test functions
          TEST_FUNCS=$(grep -E "^func (Test|Benchmark)[A-Z][a-zA-Z0-9_]*" "$file" | sed -E 's/func ([A-Za-z0-9_]+).*/\1/')

          if [ -z "$TEST_FUNCS" ]; then
            echo "  No test functions found" >> $REPORT_FILE
            continue
          fi

          # Check each test function
          while read -r func_name; do
            TOTAL_TESTS=$((TOTAL_TESTS + 1))
            IS_COMPLIANT=false

            # Check if the function name follows any of the expected prefixes
            for prefix in "${!PREFIXES[@]}"; do
              if [[ "$func_name" == ${PREFIXES[$prefix]}* ]]; then
                IS_COMPLIANT=true
                break
              fi
            done

            if $IS_COMPLIANT; then
              COMPLIANT_TESTS=$((COMPLIANT_TESTS + 1))
            else
              NON_COMPLIANT_TESTS=$((NON_COMPLIANT_TESTS + 1))
              echo "  ❌ $func_name" >> $REPORT_FILE

              # Suggest better name based on function context
              if [[ "$func_name" == *"Error"* ]] || [[ "$func_name" == *"Fail"* ]]; then
                echo "    Suggestion: ${PREFIXES[test_error]}${func_name#Test}" >> $REPORT_FILE
              elif [[ "$func_name" == *"Mock"* ]]; then
                echo "    Suggestion: ${PREFIXES[test_mock]}${func_name#Test}" >> $REPORT_FILE
              elif [[ "$func_name" == *"Benchmark"* ]]; then
                echo "    Suggestion: ${PREFIXES[test_benchmark]}${func_name#Benchmark}" >> $REPORT_FILE
              elif [[ "$func_name" == *"Integration"* ]]; then
                echo "    Suggestion: ${PREFIXES[test_integration]}${func_name#Test}" >> $REPORT_FILE
              else
                echo "    Suggestion: ${PREFIXES[test_unit]}${func_name#Test}" >> $REPORT_FILE
              fi
            fi
          done <<< "$TEST_FUNCS"
        done

        # Generate summary
        echo -e "\nSummary:" >> $REPORT_FILE
        echo "--------" >> $REPORT_FILE
        echo "Total test functions: $TOTAL_TESTS" >> $REPORT_FILE
        echo "Compliant functions: $COMPLIANT_TESTS" >> $REPORT_FILE
        echo "Non-compliant functions: $NON_COMPLIANT_TESTS" >> $REPORT_FILE

        if [ $TOTAL_TESTS -gt 0 ]; then
          COMPLIANCE_PERCENTAGE=$((COMPLIANT_TESTS * 100 / TOTAL_TESTS))
          echo "Naming convention compliance: $COMPLIANCE_PERCENTAGE%" >> $REPORT_FILE

          # Add recommendations based on compliance level
          echo -e "\nRecommendations:" >> $REPORT_FILE
          echo "--------------" >> $REPORT_FILE
          if [ $COMPLIANCE_PERCENTAGE -lt 30 ]; then
            echo "⚠️ Low naming compliance. Consider updating test function names to follow Guild conventions:" >> $REPORT_FILE
          elif [ $COMPLIANCE_PERCENTAGE -lt 70 ]; then
            echo "🔄 Moderate naming compliance. Continue improving test function names:" >> $REPORT_FILE
          else
            echo "✅ Good naming compliance. Maintain consistency with these conventions:" >> $REPORT_FILE
          fi

          # Add naming convention guide
          echo "- Unit tests: ${PREFIXES[test_unit]}YourFunction" >> $REPORT_FILE
          echo "- Integration tests: ${PREFIXES[test_integration]}YourFeature" >> $REPORT_FILE
          echo "- Mock tests: ${PREFIXES[test_mock]}YourMock" >> $REPORT_FILE
          echo "- Error handling tests: ${PREFIXES[test_error]}ErrorCase" >> $REPORT_FILE
          echo "- Benchmarks: ${PREFIXES[test_benchmark]}YourFunction" >> $REPORT_FILE
        fi

        echo "Naming convention lint report generated at $REPORT_FILE"
        cat $REPORT_FILE

  test:report:
    desc: Generate a comprehensive test quality report with coverage, verification, and lore compliance
    cmds:
      - |
        echo "🏰 Generating comprehensive Guild test quality report..."
        mkdir -p ./coverage/report

        # Set the report date and filename
        REPORT_DATE=$(date "+%Y-%m-%d")
        REPORT_FILE="./coverage/report/guild_test_report_${REPORT_DATE}.md"

        # Initialize report with header
        cat > $REPORT_FILE << EOF
        # Guild Test Quality Report 📜

        *Generated on: $(date "+%Y-%m-%d %H:%M:%S")*

        This report provides a comprehensive analysis of the Guild codebase test quality,
        including coverage metrics, naming convention compliance, and adherence to Guild lore.

        ## 📊 Coverage Summary

        EOF

        # Run coverage analysis for working packages and append to report
        echo "⚙️ Analyzing test coverage..."

        # Initialize the coverage file with mode: set
        echo "mode: set" > ./coverage/report_coverage.out

        # Manually specify the packages we know are working
        WORKING_PACKAGES=(
          "github.com/blockhead-consulting/guild/pkg/providers"
          "github.com/blockhead-consulting/guild/pkg/providers/openai"
          "github.com/blockhead-consulting/guild/tools"
        )

        # Package coverage table header
        echo "| Package | Coverage | Status |" >> $REPORT_FILE
        echo "|---------|----------|--------|" >> $REPORT_FILE

        for pkg in "${WORKING_PACKAGES[@]}"; do
          echo "  Testing $pkg"
          # Run test with coverage
          if go test -coverprofile=./coverage/temp.out "$pkg" > /dev/null 2>&1; then
            PACKAGE_COVERAGE=$(go tool cover -func=./coverage/temp.out | grep total | awk '{print $3}')

            # Determine status based on coverage percentage
            COVERAGE_NUM=$(echo $PACKAGE_COVERAGE | tr -d '%')
            if (( $(echo "$COVERAGE_NUM >= 80" | bc -l) )); then
              STATUS="✅ Excellent"
            elif (( $(echo "$COVERAGE_NUM >= 60" | bc -l) )); then
              STATUS="✓ Good"
            elif (( $(echo "$COVERAGE_NUM >= 40" | bc -l) )); then
              STATUS="⚠️ Needs Improvement"
            else
              STATUS="❌ Poor"
            fi

            # Add to report
            echo "| \`$pkg\` | $PACKAGE_COVERAGE | $STATUS |" >> $REPORT_FILE

            # Append to coverage file, skipping the mode line
            tail -n +2 ./coverage/temp.out >> ./coverage/report_coverage.out
          else
            echo "| \`$pkg\` | 0.0% | ❌ Tests Failed |" >> $REPORT_FILE
          fi
        done

        # Calculate total coverage
        TOTAL_COVERAGE=$(go tool cover -func=./coverage/report_coverage.out | grep total | awk '{print $3}')
        echo -e "\n**Total Coverage: $TOTAL_COVERAGE**" >> $REPORT_FILE

        # Generate and link the coverage HTML
        go tool cover -html=./coverage/report_coverage.out -o ./coverage/report/coverage.html
        echo -e "\n[View Detailed Coverage Report](./coverage.html)" >> $REPORT_FILE

        # Add lore adherence analysis to report
        echo -e "\n## 🏛️ Guild Lore Adherence\n" >> $REPORT_FILE

        # Define Guild lore terminology patterns to search for
        GUILD_TERMS=(
          "Guild" "Agent" "Artisan" "Manager" "Apprentice"
          "Craft" "Workshop" "Journeyman" "Master"
          "Hall" "Chamber" "Archive" "Ledger"
        )

        # Check for Guild lore terms usage in test files
        echo "### Lore Term Usage in Tests" >> $REPORT_FILE
        echo "" >> $REPORT_FILE
        echo "| Term | Occurrences |" >> $REPORT_FILE
        echo "|------|-------------|" >> $REPORT_FILE

        TOTAL_LORE_USAGES=0
        for term in "${GUILD_TERMS[@]}"; do
          COUNT=$(grep -r "$term" --include="*_test.go" . | wc -l)
          echo "| $term | $COUNT |" >> $REPORT_FILE
          TOTAL_LORE_USAGES=$((TOTAL_LORE_USAGES + COUNT))
        done

        # Check for medieval-themed test function names
        THEMED_TEST_FUNCS=$(grep -r "func Test.*Craft\|func Test.*Master\|func Test.*Guild\|func Test.*Artisan\|func Test.*Workshop" --include="*_test.go" . | wc -l)
        TOTAL_TEST_FUNCS=$(grep -r "^func Test" --include="*_test.go" . | wc -l)

        # Calculate adherence percentages
        if [ $TOTAL_TEST_FUNCS -gt 0 ]; then
          THEME_ADHERENCE=$((THEMED_TEST_FUNCS * 100 / TOTAL_TEST_FUNCS))
          echo -e "\n### Lore Adherence Metrics\n" >> $REPORT_FILE
          echo "- **Total test functions:** $TOTAL_TEST_FUNCS" >> $REPORT_FILE
          echo "- **Themed function names:** $THEMED_TEST_FUNCS" >> $REPORT_FILE
          echo "- **Theme adherence percentage:** $THEME_ADHERENCE%" >> $REPORT_FILE

          # Add adherence rating
          echo -e "\n### Lore Adherence Rating\n" >> $REPORT_FILE
          if [ $THEME_ADHERENCE -lt 20 ]; then
            echo "⚠️ **Low lore adherence**" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "Recommendation: Consider renaming test functions to follow Guild terminology. Use terms like GuildMaster, Craftsman, Workshop, Apprentice, Hall, Chamber, Archive." >> $REPORT_FILE
          elif [ $THEME_ADHERENCE -lt 50 ]; then
            echo "🔄 **Moderate lore adherence**" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "Recommendation: Continue improving test names and descriptions with Guild terminology." >> $REPORT_FILE
          else
            echo "✅ **Good lore adherence**" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "Recommendation: Maintain consistency with Guild terminology." >> $REPORT_FILE
          fi
        else
          echo -e "\n**No test functions found to analyze for lore adherence.**" >> $REPORT_FILE
        fi

        # Add naming convention compliance to report
        echo -e "\n## 📝 Naming Convention Compliance\n" >> $REPORT_FILE

        # Define expected prefixes for different test types
        declare -A PREFIXES
        PREFIXES=(
          ["test_unit"]="TestCraft"
          ["test_integration"]="TestGuild"
          ["test_mock"]="TestJourneyman"
          ["test_error"]="TestApprentice"
          ["test_benchmark"]="BenchmarkMaster"
        )

        # Naming convention guide
        echo "### Guild Test Naming Conventions\n" >> $REPORT_FILE
        echo "| Test Type | Convention |" >> $REPORT_FILE
        echo "|-----------|------------|" >> $REPORT_FILE
        echo "| Unit tests | \`${PREFIXES[test_unit]}YourFunction\` |" >> $REPORT_FILE
        echo "| Integration tests | \`${PREFIXES[test_integration]}YourFeature\` |" >> $REPORT_FILE
        echo "| Mock tests | \`${PREFIXES[test_mock]}YourMock\` |" >> $REPORT_FILE
        echo "| Error handling tests | \`${PREFIXES[test_error]}ErrorCase\` |" >> $REPORT_FILE
        echo "| Benchmarks | \`${PREFIXES[test_benchmark]}YourFunction\` |" >> $REPORT_FILE

        # Find all test files and count compliant vs non-compliant names
        echo -e "\n### Naming Compliance Summary\n" >> $REPORT_FILE

        TEST_FILES=$(find . -name "*_test.go")
        TOTAL_TESTS=0
        COMPLIANT_TESTS=0
        NON_COMPLIANT_TESTS=0

        for file in $TEST_FILES; do
          # Extract test functions
          TEST_FUNCS=$(grep -E "^func (Test|Benchmark)[A-Z][a-zA-Z0-9_]*" "$file" | sed -E 's/func ([A-Za-z0-9_]+).*/\1/')

          if [ -z "$TEST_FUNCS" ]; then
            continue
          fi

          # Check each test function
          while read -r func_name; do
            TOTAL_TESTS=$((TOTAL_TESTS + 1))
            IS_COMPLIANT=false

            # Check if the function name follows any of the expected prefixes
            for prefix in "${!PREFIXES[@]}"; do
              if [[ "$func_name" == ${PREFIXES[$prefix]}* ]]; then
                IS_COMPLIANT=true
                break
              fi
            done

            if $IS_COMPLIANT; then
              COMPLIANT_TESTS=$((COMPLIANT_TESTS + 1))
            else
              NON_COMPLIANT_TESTS=$((NON_COMPLIANT_TESTS + 1))
            fi
          done <<< "$TEST_FUNCS"
        done

        # Generate naming compliance summary
        echo "- **Total test functions:** $TOTAL_TESTS" >> $REPORT_FILE
        echo "- **Compliant function names:** $COMPLIANT_TESTS" >> $REPORT_FILE
        echo "- **Non-compliant function names:** $NON_COMPLIANT_TESTS" >> $REPORT_FILE

        if [ $TOTAL_TESTS -gt 0 ]; then
          COMPLIANCE_PERCENTAGE=$((COMPLIANT_TESTS * 100 / TOTAL_TESTS))
          echo "- **Naming convention compliance:** $COMPLIANCE_PERCENTAGE%" >> $REPORT_FILE

          # Add compliance rating
          echo -e "\n### Naming Convention Rating\n" >> $REPORT_FILE
          if [ $COMPLIANCE_PERCENTAGE -lt 30 ]; then
            echo "⚠️ **Low naming compliance**" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "Recommendation: Consider updating test function names to follow Guild conventions." >> $REPORT_FILE
          elif [ $COMPLIANCE_PERCENTAGE -lt 70 ]; then
            echo "🔄 **Moderate naming compliance**" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "Recommendation: Continue improving test function names to match Guild conventions." >> $REPORT_FILE
          else
            echo "✅ **Good naming compliance**" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            echo "Recommendation: Maintain consistency with Guild naming conventions." >> $REPORT_FILE
          fi
        fi

        # Add test quality metrics to the report
        echo -e "\n## ⚙️ Test Quality Metrics\n" >> $REPORT_FILE

        # Check for error handling in tests
        ERROR_HANDLERS=$(grep -r "if err != nil" --include="*.go" . | grep -v "_test.go" | wc -l)
        ERROR_TESTS=$(grep -r "if err != nil" --include="*_test.go" . | wc -l)

        # Check for context usage in tests
        CTX_USES=$(grep -r "ctx context.Context" --include="*.go" . | grep -v "_test.go" | wc -l)
        CTX_TESTS=$(grep -r "context.WithCancel\|context.WithTimeout\|context.WithDeadline" --include="*_test.go" . | wc -l)

        # Check for interfaces and mocks
        INTERFACES=$(grep -r "type [A-Z].*interface" --include="*.go" . | grep -v "_test.go" | wc -l)
        MOCKS=$(grep -r "mock\|Mock" --include="*_test.go" . | wc -l)

        # Add metrics to report
        echo "| Metric | Value |" >> $REPORT_FILE
        echo "|--------|-------|" >> $REPORT_FILE
        echo "| Error handlers in code | $ERROR_HANDLERS |" >> $REPORT_FILE
        echo "| Error checks in tests | $ERROR_TESTS |" >> $REPORT_FILE
        echo "| Context params in code | $CTX_USES |" >> $REPORT_FILE
        echo "| Context testing | $CTX_TESTS |" >> $REPORT_FILE
        echo "| Interfaces defined | $INTERFACES |" >> $REPORT_FILE
        echo "| Mock usage in tests | $MOCKS |" >> $REPORT_FILE

        # Check for table-driven tests in working packages
        echo -e "\n### Table-Driven Test Usage\n" >> $REPORT_FILE
        echo "| Package | Table-Driven Tests | Test Assertions |" >> $REPORT_FILE
        echo "|---------|-------------------|-----------------|" >> $REPORT_FILE

        for pkg in "${WORKING_PACKAGES[@]}"; do
          # Convert from module path to relative path
          REL_PKG=$(echo "$pkg" | sed 's/github.com\/blockhead-consulting\/guild\//\.\//')

          # Check for table-driven tests
          TABLE_TESTS=$(grep -r "range.*cases\|range.*tests\|for _, tc := range\|for _, tt :=" --include="*_test.go" "$REL_PKG" 2>/dev/null | wc -l)

          # Check for assertions
          ASSERTIONS=$(grep -r "assert\|t.Error\|t.Fatal\|t.Log" --include="*_test.go" "$REL_PKG" 2>/dev/null | wc -l)

          echo "| \`$pkg\` | $TABLE_TESTS | $ASSERTIONS |" >> $REPORT_FILE
        done

        # Add conclusion and recommendations
        echo -e "\n## 🏹 Recommendations\n" >> $REPORT_FILE

        # Coverage recommendations
        COVERAGE_NUM=$(echo $TOTAL_COVERAGE | tr -d '%')
        if (( $(echo "$COVERAGE_NUM < 60" | bc -l) )); then
          echo "- **Increase test coverage:** Current coverage is $TOTAL_COVERAGE. Aim for at least 70% coverage." >> $REPORT_FILE
        fi

        # Lore adherence recommendations
        if [ $TOTAL_TEST_FUNCS -gt 0 ] && [ $THEME_ADHERENCE -lt 40 ]; then
          echo "- **Improve lore adherence:** Rename test functions to follow Guild terminology." >> $REPORT_FILE
        fi

        # Error testing recommendations
        if [ $ERROR_HANDLERS -gt $ERROR_TESTS ]; then
          echo "- **Add more error tests:** Error handling in code ($ERROR_HANDLERS) exceeds error testing ($ERROR_TESTS)." >> $REPORT_FILE
        fi

        # Context testing recommendations
        if [ $CTX_USES -gt $CTX_TESTS ]; then
          echo "- **Improve context testing:** Add tests for context cancellation and timeouts." >> $REPORT_FILE
        fi

        # Mock usage recommendations
        if [ $INTERFACES -gt $MOCKS ]; then
          echo "- **Increase mock usage:** Create mocks for all interfaces to improve test isolation." >> $REPORT_FILE
        fi

        # Add footer
        echo -e "\n---\n" >> $REPORT_FILE
        echo "*This report was generated by the Guild Test Analysis System.*" >> $REPORT_FILE

        echo "Comprehensive Guild test report generated at $REPORT_FILE"

        # Open the report if possible
        if command -v open >/dev/null 2>&1; then
          open "$REPORT_FILE"
        elif command -v xdg-open >/dev/null 2>&1; then
          xdg-open "$REPORT_FILE"
        else
          echo "Report is available at $REPORT_FILE"
        fi