# Example Guild Configuration with Cost Budget Management
# This file demonstrates how to configure cost budgets for agents and tools

# Global cost configuration
costs:
  # API model pricing (per 1K tokens)
  api_models:
    # OpenAI Models
    gpt-4-turbo: 10.00      # $10.00 per 1M tokens
    gpt-4: 30.00            # $30.00 per 1M tokens  
    gpt-3.5-turbo: 0.50     # $0.50 per 1M tokens
    
    # Anthropic Models  
    claude-3-opus: 15.00    # $15.00 per 1M tokens (prompt)
    claude-3-sonnet: 3.00   # $3.00 per 1M tokens (prompt)
    claude-3-haiku: 0.25    # $0.25 per 1M tokens (prompt)
    
  # Local models (self-hosted)
  local_models:
    llama3-8b: 0.01         # Minimal cost for compute
    mixtral-8x7b: 0.02      # Slightly higher for larger model
    
  # Tool costs (per invocation)
  cli_tools:
    default: 0.001          # Default cost for simple CLI tools
    shell: 0.01             # Shell command execution
    file_read: 0.001        # File system operations
    file_write: 0.002       # Writing is slightly more expensive
    http_request: 0.05      # External API calls
    web_scraper: 0.10       # Complex web scraping
    
  # Daily and per-task budgets
  budgets:
    daily_maximum: 50.00    # Maximum daily spend across all agents
    per_task_default: 2.00  # Default budget per task
    emergency_buffer: 5.00  # Emergency buffer for critical tasks

# Agent-specific configurations
agents:
  # Research Analyst Agent
  research_analyst:
    type: worker
    model: gpt-3.5-turbo
    budgets:
      llm: 5.00             # $5 for LLM usage
      tool: 1.00            # $1 for tool usage
      storage: 0.50         # $0.50 for storage operations
      daily_limit: 10.00    # Daily spending limit
    cost_optimization:
      prefer_cached: true   # Use cached responses when available
      fallback_model: llama3-8b  # Fallback to cheaper model if budget low
      
  # Senior Developer Agent  
  senior_developer:
    type: worker
    model: claude-3-sonnet   # More capable model for complex tasks
    budgets:
      llm: 15.00           # Higher budget for complex reasoning
      tool: 5.00           # More tools available
      storage: 1.00        
      daily_limit: 30.00   
    cost_optimization:
      dynamic_model: true   # Switch models based on task complexity
      models:
        simple: gpt-3.5-turbo
        moderate: claude-3-haiku
        complex: claude-3-sonnet
        
  # Manager Agent
  project_manager:
    type: manager
    model: gpt-4-turbo      # Good balance of capability and cost
    budgets:
      llm: 20.00           # Needs to coordinate multiple agents
      tool: 2.00           # Limited tool usage
      storage: 0.50
      daily_limit: 25.00
      subordinate_budget: 50.00  # Budget to allocate to worker agents
    cost_optimization:
      batch_operations: true     # Batch similar requests
      summary_frequency: 100     # Summarize context every 100 messages

# Task-specific budget overrides
task_budgets:
  critical_bug_fix:
    multiplier: 3.0         # 3x the normal budget for critical tasks
    max_override: 50.00     # But cap at $50
    
  routine_maintenance:
    multiplier: 0.5         # Half the normal budget for routine tasks
    
  research_task:
    fixed_budget: 10.00     # Fixed budget regardless of defaults
    
  unlimited_demo:
    unlimited: true         # No budget restrictions (use with caution!)

# Cost monitoring and alerts
monitoring:
  alert_thresholds:
    hourly_spend: 5.00      # Alert if spending exceeds $5/hour
    budget_remaining: 0.20  # Alert when only 20% budget remains
    
  reporting:
    frequency: hourly       # Generate cost reports hourly
    detail_level: summary   # Summary, detailed, or verbose
    include_predictions: true  # Include cost predictions
    
  optimization_rules:
    - rule: downgrade_model
      condition: budget_used > 0.8  # When 80% of budget is used
      action: use_fallback_model
      
    - rule: pause_non_critical
      condition: daily_budget_used > 0.9
      action: pause_low_priority_tasks
      
    - rule: request_budget_increase
      condition: critical_task AND budget_remaining < task_estimate
      action: notify_admin

# Example of per-objective configuration
objectives:
  implement_auth_system:
    agents:
      - senior_developer
      - research_analyst
    shared_budget: 25.00    # Shared budget pool for this objective
    cost_allocation:
      development: 0.7      # 70% for development
      research: 0.2         # 20% for research
      testing: 0.1          # 10% for testing
      
  weekly_report_generation:
    agents:
      - research_analyst
    fixed_budget: 2.00      # Small fixed budget for routine task
    schedule: weekly        # Runs on schedule
    
# Advanced cost features
advanced:
  cost_prediction:
    enabled: true
    model: linear_regression  # Predict costs based on historical data
    
  dynamic_pricing:
    enabled: true
    peak_hours_multiplier: 1.5  # 50% higher during peak hours
    off_peak_discount: 0.8      # 20% discount during off-peak
    
  budget_sharing:
    enabled: true
    share_unused_budget: true   # Share unused budget among agents
    reallocation_frequency: hourly