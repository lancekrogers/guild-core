# Pre-commit hooks for Guild-Core
# See https://pre-commit.com for more information

repos:
  # Go formatting and imports
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.61.0
    hooks:
      - id: golangci-lint
        args: ['--fix']

  # Go imports formatting (moved to local hooks below)

  # General file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Go specific checks
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'go fmt ./...'
        language: system
        files: '\.go$'
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./...'
        language: system
        files: '\.go$'
        pass_filenames: false

      - id: goimports-reviser
        name: goimports-reviser
        entry: goimports-reviser -rm-unused -set-alias -format
        language: system
        types: [go]
        pass_filenames: true

      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        pass_filenames: false

      - id: go-test-short
        name: go test (short)
        entry: bash -c 'go test -short ./...'
        language: system
        files: '\.go$'
        pass_filenames: false

      # Guild-specific checks
      - id: no-dev-artifacts
        name: Check for development artifacts
        entry: bash -c '! find . -name "*.disabled" -o -name "*.old" -o -name "*.wip" -o -name "*.needs_work" -o -name "*.backup" -o -name "*.tmp" -o -name "*.bak" | grep -v ".git" | head -1'
        language: system
        pass_filenames: false

      - id: check-build
        name: Check build
        entry: bash -c 'go build -buildvcs=false -o /tmp/guild-pre-commit-test ./cmd/guild && rm /tmp/guild-pre-commit-test'
        language: system
        files: '\.go$'
        pass_filenames: false

  # Security scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ['--fix']

# Configuration for specific hooks
default_language_version:
  golang: "1.24.3"
