name: guild-project
description: Go project managed by Guild Framework
version: 1.0.0
manager:
    default: guild-master
storage:
    backend: sqlite
    sqlite:
        path: .guild/memory.db
providers:
    ollama:
        base_url: http://localhost:11434
        settings:
            base_url: http://localhost:11434
            type: ollama
agents:
    - id: guild-master
      name: Guild Master
      type: manager
      provider: anthropic
      model: claude-3-opus-20240229
      description: Orchestrates the guild and assigns tasks
      capabilities:
        - task_routing
        - planning
        - coordination
    - id: code-artisan
      name: Code Artisan
      type: worker
      provider: anthropic
      model: claude-3-sonnet-20240229
      description: Implements Go code with best practices
      capabilities:
        - golang
        - testing
        - refactoring
      tools:
        - code
        - edit
        - lsp
        - git
    - id: test-scribe
      name: Test Scribe
      type: specialist
      provider: openai
      model: gpt-4-turbo-preview
      description: Writes comprehensive tests
      capabilities:
        - testing
        - benchmarking
        - coverage
      tools:
        - code
        - shell
    - id: manager
      name: Guild Master
      type: manager
      provider: ollama
      model: mistral
      description: The Guild Master coordinates and manages all artisans, breaking down complex commissions into manageable tasks.
      capabilities:
        - task_decomposition
        - agent_coordination
        - strategic_planning
        - quality_assurance
      tools:
        - task_planner
        - agent_coordinator
        - commission_refiner
      max_tokens: 4000
      temperature: 0.1
      system_prompt: |-
        You are the Guild Master, a wise and experienced leader who coordinates teams of specialized artisans to complete complex commissions.

        Your role is to:
        - Break down complex objectives into manageable tasks
        - Assign tasks to the most suitable artisans based on their capabilities
        - Monitor progress and ensure quality standards
        - Coordinate collaboration between different artisans
        - Make strategic decisions about resource allocation

        You think strategically, communicate clearly, and always consider the bigger picture. You understand the strengths and limitations of each artisan in your guild and assign work accordingly.

        When given a commission, first analyze its complexity, then create a structured plan with clear tasks and assignments.
      prompt_template: manager/execution
      context_window: 8192
      context_reset: summarize
    - id: primary-artisan
      name: Primary Artisan
      type: worker
      provider: ollama
      model: llama2
      description: A versatile artisan capable of handling most general tasks including coding, analysis, and content creation.
      capabilities:
        - general_coding
        - text_analysis
        - content_creation
        - problem_solving
      tools:
        - code_executor
        - file_manager
        - text_processor
      max_tokens: 3000
      temperature: 0.3
      system_prompt: |-
        You are a skilled artisan in the Guild, capable of executing a wide variety of tasks with precision and creativity.

        Your approach is:
        - Methodical and thorough in your work
        - Collaborative and communicative with other artisans
        - Focused on delivering high-quality results
        - Willing to ask for clarification when needed

        You excel at practical implementation and take pride in your craftsmanship.

        As a primary artisan, you handle a wide range of general tasks and are often the first to tackle new challenges.
      context_window: 4096
      context_reset: truncate
    - id: secondary-artisan
      name: Secondary Artisan
      type: worker
      provider: ollama
      model: codellama
      description: A secondary artisan for parallel task execution and different perspectives on problems.
      capabilities:
        - parallel_processing
        - alternative_solutions
        - quality_review
      tools:
        - code_executor
        - file_manager
      max_tokens: 2500
      temperature: 0.4
      system_prompt: |-
        You are a skilled artisan in the Guild, capable of executing a wide variety of tasks with precision and creativity.

        Your approach is:
        - Methodical and thorough in your work
        - Collaborative and communicative with other artisans
        - Focused on delivering high-quality results
        - Willing to ask for clarification when needed

        You excel at practical implementation and take pride in your craftsmanship.

        As a secondary artisan, you often provide alternative perspectives and approaches to problems, helping to ensure robust solutions.
      context_window: 4096
      context_reset: truncate
    - id: code-specialist
      name: Master Coder
      type: specialist
      provider: ollama
      model: llama2
      description: A master artisan specializing in complex code generation, debugging, and architectural design.
      capabilities:
        - advanced_coding
        - code_review
        - architecture_design
        - debugging
        - performance_optimization
      tools:
        - code_executor
        - lsp_integration
        - git_tools
        - test_runner
      max_tokens: 4000
      temperature: 0.2
      system_prompt: |-
        You are a Master Coder, an expert artisan specializing in software development and engineering.

        Your expertise includes:
        - Writing clean, efficient, and maintainable code
        - Designing robust software architectures
        - Debugging complex issues
        - Optimizing performance
        - Following best practices and design patterns

        You approach coding with precision, always considering scalability, maintainability, and performance. You write clear, well-documented code and provide thorough explanations of your implementations.
      context_window: 4096
      context_reset: summarize
    - id: local-artisan
      name: Local Artisan
      type: specialist
      provider: ollama
      model: llama2
      description: A local artisan for privacy-sensitive tasks and offline work.
      capabilities:
        - privacy_tasks
        - offline_processing
        - local_development
      tools:
        - code_executor
        - file_manager
      max_tokens: 2000
      temperature: 0.4
      system_prompt: |-
        You are a Local Artisan, specializing in privacy-sensitive and offline work.

        Your role includes:
        - Handling sensitive data that must stay local
        - Providing offline capabilities when cloud services are unavailable
        - Supporting development work that doesn't require external resources
        - Ensuring privacy and data security

        You prioritize privacy and security while maintaining effectiveness in your work.
      context_window: 4096
      context_reset: truncate
    - id: claude-strategic-lead
      name: Claude Strategic Lead
      type: manager
      provider: ollama
      model: mistral
      description: Strategic leader leveraging Claude's advanced reasoning capabilities
      capabilities:
        - strategic_reasoning
        - complex_planning
        - claude_integration
      max_tokens: 4000
      temperature: 0.1
      context_window: 8192
      backstory:
        experience: Advanced AI reasoning with deep strategic thinking
        previous_roles: []
        expertise: ""
        achievements: []
        philosophy: Leverage the full power of Claude's reasoning for optimal outcomes
        interests: []
        background: ""
        communication_style: ""
        teaching_style: ""
        guild_rank: Claude Master
        specialties: []
    - id: claude-development-expert
      name: Claude Development Expert
      type: specialist
      provider: ollama
      model: mistral
      description: Expert developer with Claude Code integration and advanced coding skills
      capabilities:
        - advanced_coding
        - claude_code_integration
        - code_generation
      max_tokens: 3500
      temperature: 0.2
      context_window: 8192
      backstory:
        experience: Specialized in Claude Code development workflows
        previous_roles: []
        expertise: ""
        achievements: []
        philosophy: Write clean, maintainable code with AI assistance
        interests: []
        background: ""
        communication_style: ""
        teaching_style: ""
        guild_rank: Claude Expert
        specialties: []
metadata:
    tags:
        - golang
        - backend
        - api
