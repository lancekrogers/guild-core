# .golangci.yml — Guild Framework
version: "2"

formatters:
  enable: [gofmt, goimports, gci, gofumpt]

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - unconvert
    - goconst
    - gocyclo
    - dupl
    - bodyclose
    - noctx
    - gosec
    - prealloc
  disable:
    - gochecknoglobals
    - gochecknoinits
    - godox
    - funlen
    - whitespace
    - wsl
    - goprintffuncname
    - mnd
    - err113

  exclusions:
    paths:
      - vendor$
      - third_party$
      - testdata$
      - examples$
      - cmd/demos$
      - '.*\.pb\.go$'
      - '.*\.pb\.gw\.go$'
      - '^mock_.*\.go$'
    rules:
      - path: _test\.go
        text: "don't use `init` function"
        linters:
          - gocyclo
          - dupl
          - gosec
