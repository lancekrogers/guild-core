syntax = "proto3";

package guild.v1;

option go_package = "github.com/guild-framework/guild-core/pkg/grpc/pb/guild/v1";

// ChatService provides real-time interactive communication with Guild agents
service ChatService {
  // Interactive bidirectional chat with agents
  rpc Chat(stream ChatRequest) returns (stream ChatResponse);

  // Get chat history for a session
  rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);

  // Create a new chat session
  rpc CreateChatSession(CreateChatSessionRequest) returns (ChatSession);

  // End a chat session
  rpc EndChatSession(EndChatSessionRequest) returns (EndChatSessionResponse);

  // List active chat sessions
  rpc ListChatSessions(ListChatSessionsRequest) returns (ListChatSessionsResponse);
}

// Chat request message
message ChatRequest {
  oneof request {
    ChatMessage message = 1;
    ChatControl control = 2;
    ToolApproval tool_approval = 3;
  }
}

// Chat response message
message ChatResponse {
  oneof response {
    ChatMessage message = 1;
    AgentThinking thinking = 2;
    ToolExecution tool_execution = 3;
    ChatEvent event = 4;
    ChatError error = 5;
  }
}

// Core chat message
message ChatMessage {
  string session_id = 1;
  string sender_id = 2; // agent_id or "user"
  string sender_name = 3;
  string content = 4;
  MessageType type = 5;
  int64 timestamp = 6;
  map<string, string> metadata = 7;

  enum MessageType {
    USER_MESSAGE = 0;
    AGENT_RESPONSE = 1;
    SYSTEM_MESSAGE = 2;
    TOOL_REQUEST = 3;
    TOOL_RESULT = 4;
    AGENT_FRAGMENT = 5; // Streaming response fragment
  }
}

// Agent thinking indicator
message AgentThinking {
  string agent_id = 1;
  string agent_name = 2;
  string session_id = 3;
  ThinkingState state = 4;
  string description = 5;
  int64 timestamp = 6;

  enum ThinkingState {
    ANALYZING = 0;
    PLANNING = 1;
    RESEARCHING = 2;
    EXECUTING = 3;
    REVIEWING = 4;
    FINALIZING = 5;
  }
}

// Tool execution status
message ToolExecution {
  string tool_id = 1;
  string tool_name = 2;
  string agent_id = 3;
  string session_id = 4;
  map<string, string> parameters = 5;
  ExecutionStatus status = 6;
  double progress = 7; // 0.0 to 1.0
  string result = 8;
  string error = 9;
  int64 started_at = 10;
  int64 updated_at = 11;
  double estimated_cost = 12;
  repeated string required_permissions = 13;
  bool requires_approval = 14;

  enum ExecutionStatus {
    PENDING = 0;
    AWAITING_APPROVAL = 1;
    EXECUTING = 2;
    COMPLETED = 3;
    FAILED = 4;
    CANCELLED = 5;
  }
}

// Chat session control
message ChatControl {
  ControlAction action = 1;
  string session_id = 2;
  map<string, string> parameters = 3;

  enum ControlAction {
    START_SESSION = 0;
    END_SESSION = 1;
    PAUSE_SESSION = 2;
    RESUME_SESSION = 3;
    INTERRUPT_AGENT = 4;
    REQUEST_STATUS = 5;
  }
}

// Tool approval from user
message ToolApproval {
  string tool_execution_id = 1;
  string session_id = 2;
  bool approved = 3;
  string reason = 4;
  map<string, string> modified_parameters = 5;
}

// Chat events
message ChatEvent {
  string session_id = 1;
  EventType type = 2;
  string description = 3;
  map<string, string> data = 4;
  int64 timestamp = 5;

  enum EventType {
    SESSION_STARTED = 0;
    SESSION_ENDED = 1;
    AGENT_JOINED = 2;
    AGENT_LEFT = 3;
    TOOL_DISCOVERED = 4;
    MEMORY_ACCESSED = 5;
    CONTEXT_UPDATED = 6;
    ERROR_OCCURRED = 7;
    COMMISSION_CREATED = 8;
    TASK_ASSIGNED = 9;
  }
}

// Chat error
message ChatError {
  string session_id = 1;
  ErrorCode code = 2;
  string message = 3;
  map<string, string> details = 4;
  int64 timestamp = 5;

  enum ErrorCode {
    UNKNOWN = 0;
    INVALID_SESSION = 1;
    AGENT_UNAVAILABLE = 2;
    TOOL_EXECUTION_FAILED = 3;
    PERMISSION_DENIED = 4;
    RATE_LIMITED = 5;
    CONTEXT_TOO_LARGE = 6;
    INVALID_REQUEST = 7;
  }
}

// Chat session management
message ChatSession {
  string id = 1;
  string name = 2;
  repeated string agent_ids = 3;
  string campaign_id = 4;
  SessionStatus status = 5;
  int64 created_at = 6;
  int64 last_activity = 7;
  map<string, string> metadata = 8;
  SessionContext context = 9;

  enum SessionStatus {
    ACTIVE = 0;
    PAUSED = 1;
    ENDED = 2;
    ERROR = 3;
  }
}

// Session context information
message SessionContext {
  string project_path = 1;
  string current_commission = 2;
  repeated string active_tasks = 3;
  map<string, string> environment = 4;
  repeated string available_tools = 5;
}

// Request/Response messages for session management
message CreateChatSessionRequest {
  string name = 1;
  repeated string agent_ids = 2;
  string campaign_id = 3;
  map<string, string> metadata = 4;
  SessionContext context = 5;
}

message EndChatSessionRequest {
  string session_id = 1;
  string reason = 2;
}

message EndChatSessionResponse {
  bool success = 1;
  string message = 2;
  ChatSessionSummary summary = 3;
}

message ListChatSessionsRequest {
  bool include_ended = 1;
  string campaign_id = 2;
  int32 limit = 3;
}

message ListChatSessionsResponse {
  repeated ChatSession sessions = 1;
  int32 total_count = 2;
}

message GetChatHistoryRequest {
  string session_id = 1;
  int64 since_timestamp = 2;
  int32 limit = 3;
  bool include_system_messages = 4;
}

message GetChatHistoryResponse {
  repeated ChatMessage messages = 1;
  repeated ChatEvent events = 2;
  int32 total_count = 3;
  bool has_more = 4;
}

// Chat session summary
message ChatSessionSummary {
  int32 total_messages = 1;
  int32 tools_executed = 2;
  double total_cost = 3;
  int32 tasks_created = 4;
  repeated string agents_involved = 5;
  string outcome = 6;
}
